<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Recorder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Draggable Title Bar -->
    <div class="titlebar">
      <span class="titlebar-title">Screen Recorder</span>
    </div>

    <!-- Hero: Record Button -->
    <section id="controls">
      <div class="record-ring">
        <button id="btn-record" class="btn-record" title="Start Recording">
          <span class="record-icon"></span>
        </button>
      </div>
      <p id="timer" class="timer">00:00</p>
      <p id="status-text" class="status">Ready to record</p>
    </section>

    <!-- Post-Processing -->
    <section id="processing" class="card hidden">
      <div class="card-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <span>Post-Processing</span>
      </div>
      <div class="progress-track">
        <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="progress-text" class="progress-label">Ready to process</p>
      <div id="processing-actions"></div>
    </section>

    <!-- Settings -->
    <section id="settings" class="card">
      <div class="card-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </div>

      <div class="setting-row">
        <label for="setting-fps">Frame Rate</label>
        <select id="setting-fps">
          <option value="15">15 fps</option>
          <option value="24">24 fps</option>
          <option value="30" selected>30 fps</option>
          <option value="60">60 fps</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="setting-zoom">Zoom Level</label>
        <div class="range-group">
          <input type="range" id="setting-zoom" min="1.5" max="3" step="0.1" value="2.0" />
          <span id="zoom-value" class="range-val">2.0x</span>
        </div>
      </div>

      <div class="setting-row">
        <label for="setting-duration">Hold Duration</label>
        <div class="range-group">
          <input type="range" id="setting-duration" min="0.5" max="3" step="0.1" value="1.5" />
          <span id="duration-value" class="range-val">1.5s</span>
        </div>
      </div>

      <div class="setting-row">
        <label>Output Folder</label>
        <button id="btn-output-dir" class="btn-path" title="Click to change">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="output-dir-text">~/Videos/ScreenRecorder</span>
        </button>
      </div>
    </section>

    <!-- Event Log -->
    <section id="event-log" class="card hidden">
      <div class="card-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Captured Events</span>
      </div>
      <ul id="event-list"></ul>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
