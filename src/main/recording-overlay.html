<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: fit-content; height: fit-content;
      background: transparent;
      overflow: hidden;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono',
                   'Menlo', 'Consolas', 'Courier New', monospace;
    }

    .wrap {
      display: inline-flex;          /* shrink-wrap the pill */
    }

    /* ── Pill ───────────────────────────────────────────────────── */
    .pill {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 52px;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.09);
      -webkit-app-region: drag;
      user-select: none;
      white-space: nowrap;
    }

    /* ── Left section: Stop + Timer ────────────────────────────── */
    .left-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-stop {
      -webkit-app-region: no-drag;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid #d4d4d4;
      color: #d4d4d4;
      padding: 0;
      transition: transform 0.1s, background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-stop:hover  { background: rgba(255,255,255,0.08); border-color: #fff; color: #fff; }
    .btn-stop:active { transform: scale(0.88); }
    .btn-stop svg    { width: 11px; height: 11px; }

    .timer {
      font-size: 15px;
      font-weight: 500;
      color: #d4d4d4;
      min-width: 40px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    /* ── Divider ────────────────────────────────────────────────── */
    .divider {
      flex-shrink: 0;
      width: 1px;
      height: 22px;
      background: rgba(255, 255, 255, 0.11);
    }

    /* ── Right section: Controls ────────────────────────────────── */
    .right-section {
      display: flex;
      align-items: center;
      gap: 2px;
      -webkit-app-region: no-drag;
    }

    .btn-icon {
      -webkit-app-region: no-drag;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #737373;
      padding: 0;
      transition: transform 0.1s, background 0.15s, color 0.15s;
    }
    .btn-icon:hover  { background: rgba(255,255,255,0.08); color: #d4d4d4; }
    .btn-icon:active { transform: scale(0.88); }
    .btn-icon svg    { width: 17px; height: 17px; }

    .btn-pause.paused { color: #a3a3a3; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="pill">
      <div class="left-section">
        <button class="btn-stop" id="stop" aria-label="Stop recording">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
        <span class="timer" id="t">0:00</span>
      </div>

      <div class="divider"></div>

      <div class="right-section">
        <button class="btn-icon btn-pause" id="pause" aria-label="Pause recording">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" id="pause-icon">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="10" y1="15" x2="10" y2="9"></line>
            <line x1="14" y1="15" x2="14" y2="9"></line>
          </svg>
        </button>
        <button class="btn-icon" id="restart" aria-label="Restart recording">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
        <button class="btn-icon" id="discard" aria-label="Discard recording">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── Resize the Electron window to exactly fit the pill + shadow bleed ──
    function fitWindow() {
      const wrap = document.getElementById('wrap');
      const { width, height } = wrap.getBoundingClientRect();
      ipcRenderer.send('recording:overlay-resize', {
        width:  Math.ceil(width),
        height: Math.ceil(height),
      });
    }

    // Run once layout is done, then again after fonts load
    requestAnimationFrame(() => fitWindow());
    document.fonts.ready.then(() => fitWindow());

    // ── Timer ─────────────────────────────────────────────────────
    const timerEl   = document.getElementById('t');
    const pauseBtn  = document.getElementById('pause');
    const pauseIcon = document.getElementById('pause-icon');

    let paused   = false;
    let elapsed  = 0;
    let lastTick = Date.now();

    const iv = setInterval(() => {
      if (!paused) {
        const now = Date.now();
        elapsed += (now - lastTick) / 1000;
        lastTick = now;
        const s = Math.floor(elapsed);
        timerEl.textContent =
          Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
      }
    }, 500);

    // ── Buttons ───────────────────────────────────────────────────
    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      if (paused) {
        pauseBtn.classList.add('paused');
        pauseIcon.innerHTML =
          '<circle cx="12" cy="12" r="10"></circle>' +
          '<polygon points="10 8 16 12 10 16 10 8"></polygon>';
        ipcRenderer.send('recording:overlay-pause-clicked');
      } else {
        lastTick = Date.now();
        pauseBtn.classList.remove('paused');
        pauseIcon.innerHTML =
          '<circle cx="12" cy="12" r="10"></circle>' +
          '<line x1="10" y1="15" x2="10" y2="9"></line>' +
          '<line x1="14" y1="15" x2="14" y2="9"></line>';
        ipcRenderer.send('recording:overlay-resume-clicked');
      }
    });

    document.getElementById('stop').addEventListener('click', () => {
      ipcRenderer.send('recording:overlay-stop-clicked');
    });

    document.getElementById('restart').addEventListener('click', () => {
      ipcRenderer.send('recording:overlay-discard-clicked');
    });

    document.getElementById('discard').addEventListener('click', () => {
      ipcRenderer.send('recording:overlay-discard-clicked');
    });

    window.addEventListener('beforeunload', () => clearInterval(iv));
  </script>
</body>
</html>
